<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brinquedoteca</title>
    <link rel="stylesheet" href="css/estilos.css">

</head>
<body>
    <img src="img/ex6_4.jpg" alt="Brinquedoteca" class="alta">


    <h1>Programa Brinquedoteca</h1>


    <form>
        <p>Nome da Criança: 
            <input type="text" id="inNome" required autofocus>
        </p>

        <p>Idade:
            <input type="number" id="inIdade" min="0" required>
            <input type="submit" value="Adicionar">
        </p>

        <input type="submit" value="Listar Todos" id="btListar">
        <input type="submit" value="Resumir idade" id="btResumir">
    </form>

    <pre></pre>

    <script src="js/ex6_4.js"></script>
</body>
</html>
