<meta charset="UTD-8">

<script>
    const jantar = Number(prompt("Informe o valor do jantar: ")) //lê o valor do jantar
    const garcom = jantar * 0.10 //calcula váriaveis de saída
    const total = jantar + garcom // calcula o total
    alert(`Taxa garcom: ${garcom.toFixed(2)}\nTotal a ser pago: ${total.toFixed(2)}`)


</script>
