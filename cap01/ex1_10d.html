<meta charset="UTF-8">

<script>
    const valorTotal = Number(prompt("Informe o valor total da conta: ")) // le o valor total
    const clientesPagar = Number(prompt("Quantos clientes vão pagar? ")) // le a quantidade de clientes
    const cadaCliente = valorTotal/clientesPagar // calcula quanto cada um vai pagar
    alert(`Cada cliente irá pagar: ${cadaCliente.toFixed(2)}`) // exibi o resultado
</script>
