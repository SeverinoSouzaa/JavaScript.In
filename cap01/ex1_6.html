<meta charset="UTF-8">

<script>
    const num1 = Number(prompt("Digite um numero: ")) // lê os numeros
    const num2 = Number(prompt("Digite outro numero: ")) // lê os numeros
    const soma = num1 + num2 // soma os dois numeros
    alert(`A soma dos dois numeros é: ${soma}`) //exibi o resultado
</script>
